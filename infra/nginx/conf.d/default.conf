# JUKWA API Gateway Configuration (OpenResty)
# Source: Architecture §4.1
# Why: Unified entry point, security (TLS termination), and service decoupling.

upstream incident_service {
    server incident-service:3001;
}

upstream commitment_service {
    server commitment-service:3002;
}

upstream traffic_service {
    server traffic-service:3003;
}

upstream identity_service {
    server identity-service:3006;
}

upstream emergency_service {
    server emergency-service:3004;
}

upstream citizen_vault {
    server citizen-vault-service:3011;
}

upstream ai_agent_service {
    server ai-agent-service:3010;
}

server {
    listen 80;
    server_name localhost;

    # Health check for the Gateway itself
    location /healthz {
        access_log off;
        return 200 '{"status": "UP", "gateway": "jukwa-nginx"}';
        add_header Content-Type application/json;
    }

    # Incident Service Routing
    location /api/v1/incidents {
        proxy_pass http://incident_service/incidents;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Commitment Service (BARAZA)
    location /api/v1/commitments {
        proxy_pass http://commitment_service/commitments;
        proxy_set_header Host $host;
    }

    # Traffic Intelligence
    location /api/v1/traffic {
        proxy_pass http://traffic_service;
        proxy_set_header Host $host;
    }

    # Identity / Auth
    location /api/v1/auth {
        proxy_pass http://identity_service/register;
        proxy_set_header Host $host;
    }

    # Emergency SOS
    location /api/v1/sos {
        proxy_pass http://emergency_service/sos;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Citizen Vault (Privacy Relay)
    location /api/v1/vault {
        proxy_pass http://citizen_vault/relay;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # Increase body limit for high-res evidence uploads
        client_max_body_size 50M;
    }

    # AI Orchestrator
    location /api/v1/ai {
        proxy_pass http://ai_agent_service;
        proxy_set_header Host $host;
    }

    # Default error handling
    error_page 404 /404.json;
    location = /404.json {
        return 404 '{"error": "Resource not found"}';
        add_header Content-Type application/json;
    }
}
