version: '3.9'

# Development overrides - adds service port mappings and enables all profiles
# These services are defined in docker-compose.yml; this file only ADDS to them

services:
  # Expose all service ports for development
  incident-service:
    ports:
      - "3001:3001"

  commitment-service:
    ports:
      - "3002:3002"

  emergency-service:
    ports:
      - "3004:3004"

  notification-service:
    ports:
      - "3007:3007"

  identity-service:
    ports:
      - "3006:3006"

  traffic-service:
    ports:
      - "3003:3003"

  ai-agent-service:
    ports:
      - "3010:3010"

  citizen-vault-service:
    ports:
      - "3011:3011"

  tor:
    ports:
      - "9050:9050"

  # Dozzle always available in dev
  logs-dashboard:
    profiles: [""]  # Always on in dev
