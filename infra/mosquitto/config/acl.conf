# JUKWA Mosquitto ACL Configuration
# Source: Master Prompt §3, Architecture §6.1

# -----------------------------------------------------------------
# Public Topics (Anonymous Read)
# -----------------------------------------------------------------

topic read jukwa/alerts/#
topic read jukwa/traffic/alerts/#
topic read jukwa/baraza/+/commitments
topic read jukwa/baraza/national/scorecards

# -----------------------------------------------------------------
# User-specific Topics (Authenticated)
# -----------------------------------------------------------------

# Citizens can read their own incident status
pattern read jukwa/incidents/%u/status

# Citizens can subscribe to their ward's verifications and polls
pattern read jukwa/baraza/%u/verifications
pattern read jukwa/civic/%u/polls

# -----------------------------------------------------------------
# Internal/Service Topics (Restricted)
# -----------------------------------------------------------------

# Only Traffic Service can publish sensors data
user traffic_service
topic write jukwa/traffic/sensors/#

# Only Emergency Service can publish to dispatch
user emergency_service
topic write jukwa/emergency/#

# -----------------------------------------------------------------
# Admin / Master Service
# -----------------------------------------------------------------
user admin
topic readwrite #
