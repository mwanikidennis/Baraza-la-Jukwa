listener 1883
allow_anonymous true

# Persistence
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest file /mosquitto/log/mosquitto.log

# For now, allow anonymous. In prod, we will use a plugin to auth with backend
# and enforce topic ACLs for jukwa/alerts, jukwa/traffic, etc.
acl_file /mosquitto/config/acl.conf
