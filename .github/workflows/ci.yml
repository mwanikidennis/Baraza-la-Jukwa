name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Detect which services changed. Other jobs run a matrix over this list.
  # When a new service is added under services/<name>/, append it to the
  # 'services' array below. Touching infra/ or workflow files re-runs everything.
  # ---------------------------------------------------------------------------
  changes:
    name: Detect changed services
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.filter.outputs.changes }}
      infra: ${{ steps.filter.outputs.infra }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            incident: 'services/incident/**'
            commitment: 'services/commitment/**'
            traffic: 'services/traffic/**'
            emergency: 'services/emergency/**'
            identity: 'services/identity/**'
            notification: 'services/notification/**'
            ai-agent: 'services/ai-agent/**'
            vault: 'services/citizen-vault/**'
            infra:
              - 'infra/**'
              - '.github/workflows/**'

  lint-test-backend:
    name: Lint & test (${{ matrix.service }})
    needs: changes
    if: ${{ needs.changes.outputs.services != '[]' || needs.changes.outputs.infra == 'true' || github.event_name == 'push' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [incident, commitment, traffic, emergency, identity, notification, ai-agent]
    defaults:
      run:
        working-directory: services/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/${{ matrix.service }}/package.json
      - run: npm install --no-audit --no-fund
      - run: npm run typecheck
      - run: npm run build
      - run: npm test

  build-images:
    name: Build & push images (${{ matrix.service }})
    needs: lint-test-backend
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [incident, commitment, traffic, emergency, identity, notification, ai-agent, citizen-vault]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/jukwa-${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=sha,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
      - name: Build (and push on main)
        uses: docker/build-push-action@v5
        with:
          context: services/${{ matrix.service }}
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  compose-smoke:
    name: docker compose smoke test
    needs: lint-test-backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Bring up stack
        working-directory: infra
        run: docker compose up -d --build
      - name: Wait for incident-service health
        run: |
          for i in $(seq 1 30); do
            status=$(docker inspect -f '{{.State.Health.Status}}' jukwa-incident-service 2>/dev/null || echo "starting")
            echo "attempt $i: $status"
            if [ "$status" = "healthy" ]; then exit 0; fi
            sleep 5
          done
          echo "incident-service did not become healthy"
          docker compose -f infra/docker-compose.yml ps
          docker logs jukwa-incident-service || true
          exit 1
      - name: Hit /health
        run: curl -fsS http://localhost:3001/health
      - name: Verify PostGIS
        run: docker exec jukwa-postgres psql -U jukwaa -d jukwaa -c "SELECT PostGIS_Version();"
      - name: Tear down
        if: always()
        working-directory: infra
        run: docker compose down -v
